document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ed-47c0-95fc-59b89032aa35\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  :root {\n    /* Cinematic dark with ADAC + HMC accents */\n    --bg-0: #07070B;\n    --bg-1: #0D0C13;\n    --bg-2: #16141F;\n    --bg-3: #1F1C2B;\n    --line: rgba(255,255,255,0.07);\n    --line-strong: rgba(255,255,255,0.16);\n\n    --text:       #FAFAF7;\n    --text-dim:   #9994A4;\n    --text-faint: #5F5B6B;\n\n    /* ADAC */\n    --yellow:       #FFCC00;\n    --yellow-soft:  #FFD94D;\n    --yellow-deep:  #D9AE00;\n    --yellow-glow:  rgba(255,204,0,0.45);\n\n    /* HMC */\n    --blue:        #1F66D9;\n    --blue-bright: #4D8BF0;\n    --blue-deep:   #0F3A8A;\n    --blue-glow:   rgba(31,102,217,0.45);\n\n    --red:        #E11E2C;\n    --red-soft:   #FF4757;\n    --red-glow:   rgba(225,30,44,0.45);\n\n    --green-ok:   #34D399;\n  }\n\n  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }\n  html, body { margin: 0; padding: 0; background: var(--bg-0); color: var(--text); font-family: 'Manrope', sans-serif; }\n  body { overflow-x: hidden; }\n\n  .serif   { font-family: 'Instrument Serif', 'Times New Roman', serif; font-weight: 400; letter-spacing: -0.02em; }\n  .serif-i { font-family: 'Instrument Serif', serif; font-style: italic; }\n  .mono    { font-family: 'JetBrains Mono', monospace; font-feature-settings: 'tnum' 1, 'zero' 1; }\n  .tnum    { font-feature-settings: 'tnum' 1; }\n\n  ::selection { background: var(--yellow-glow); color: #000; }\n\n  /* Scroll container with snap */\n  #scroller {\n    height: 100vh;\n    overflow-y: scroll;\n    scroll-snap-type: y mandatory;\n    scroll-behavior: smooth;\n    scrollbar-width: none;\n    position: relative;\n    z-index: 2;\n  }\n  #scroller::-webkit-scrollbar { display: none; }\n\n  .slide {\n    scroll-snap-align: start;\n    scroll-snap-stop: always;\n    min-height: 100vh;\n    width: 100vw;\n    position: relative;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    padding: 100px 7vw 90px;\n    box-sizing: border-box;\n    overflow: hidden;\n  }\n  .slide-inner { width: 100%; max-width: 1500px; margin: 0 auto; position: relative; z-index: 2; }\n\n  /* Particles canvas */\n  #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }\n\n  /* Brand bar */\n  #brandbar {\n    position: fixed; top: 0; left: 0; right: 0;\n    padding: 22px 36px; z-index: 50;\n    display: flex; justify-content: space-between; align-items: center;\n    pointer-events: none;\n    mix-blend-mode: difference;\n    color: rgba(255,255,255,0.9);\n  }\n  #brandbar .mono { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; }\n  #brandbar .logo {\n    display: inline-flex; align-items: center; gap: 10px;\n    font-family: 'Manrope', sans-serif; font-weight: 700; letter-spacing: 0.1em; font-size: 11px;\n  }\n  #brandbar .x { opacity: 0.55; }\n\n  /* Right rail — chapter dots */\n  #rail {\n    position: fixed; right: 26px; top: 50%; transform: translateY(-50%);\n    z-index: 50;\n    display: flex; flex-direction: column; gap: 10px;\n    pointer-events: auto;\n  }\n  #rail button {\n    position: relative;\n    width: 22px; height: 14px;\n    display: flex; align-items: center; justify-content: flex-end;\n    background: transparent; border: 0; cursor: pointer; padding: 0;\n  }\n  #rail button .tick {\n    width: 14px; height: 2px;\n    background: rgba(255,255,255,0.22);\n    transition: all .4s cubic-bezier(.22,1,.36,1);\n    border-radius: 1px;\n  }\n  #rail button:hover .tick { background: rgba(255,255,255,0.7); width: 18px; }\n  #rail button[aria-current=\"true\"] .tick {\n    background: var(--yellow);\n    box-shadow: 0 0 12px var(--yellow-glow);\n    width: 22px; height: 2px;\n  }\n  #rail button .label {\n    position: absolute; right: 30px; top: 50%; transform: translateY(-50%);\n    white-space: nowrap;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;\n    color: var(--text);\n    background: rgba(13,12,19,0.92); padding: 5px 9px; border-radius: 4px;\n    border: 1px solid var(--line);\n    opacity: 0; pointer-events: none;\n    transition: opacity .25s ease;\n  }\n  #rail button:hover .label,\n  #rail button[aria-current=\"true\"] .label { opacity: 1; }\n\n  /* Bottom progress */\n  #progress {\n    position: fixed; left: 0; right: 0; bottom: 0;\n    height: 2px; background: rgba(255,255,255,0.04); z-index: 50;\n  }\n  #progress > div {\n    height: 100%;\n    background: linear-gradient(90deg, var(--yellow), var(--blue-bright));\n    width: 0; transition: width .15s linear;\n    box-shadow: 0 0 14px var(--yellow-glow);\n  }\n\n  /* Slide counter (bottom right) */\n  #counter {\n    position: fixed; bottom: 18px; right: 28px; z-index: 50;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px; letter-spacing: 0.22em;\n    color: var(--text-dim);\n    pointer-events: none;\n  }\n  #counter b { color: var(--yellow); font-weight: 500; }\n\n  /* Grain overlay */\n  .grain::after {\n    content: \"\"; position: absolute; inset: 0; pointer-events: none;\n    opacity: 0.035; mix-blend-mode: overlay;\n    background-image: url(\"data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><\u002Ffilter><rect width='100%' height='100%' filter='url(%23n)'/><\u002Fsvg>\");\n  }\n\n  .blob {\n    position: absolute; border-radius: 9999px; filter: blur(120px);\n    opacity: 0.4; pointer-events: none; z-index: 0;\n  }\n\n  .hairline { border-color: var(--line); }\n  .text-dim { color: var(--text-dim); }\n  .text-faint { color: var(--text-faint); }\n\n  /* Eyebrow / chapter tag */\n  .eyebrow {\n    text-transform: uppercase;\n    letter-spacing: 0.32em;\n    font-size: 11px; font-weight: 500;\n    color: var(--text-dim);\n    font-family: 'Manrope', sans-serif;\n  }\n  .eyebrow.yellow { color: var(--yellow); }\n  .eyebrow.blue   { color: var(--blue-bright); }\n  .eyebrow.red    { color: var(--red-soft); }\n\n  /* Pill */\n  .pill {\n    display: inline-flex; align-items: center; gap: 8px;\n    padding: 6px 14px; border-radius: 999px;\n    border: 1px solid var(--line-strong);\n    background: rgba(255,255,255,0.02);\n    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;\n    color: var(--text-dim);\n    font-family: 'Manrope', sans-serif;\n  }\n  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--yellow); box-shadow: 0 0 10px var(--yellow-glow); }\n  .pill.blue .dot { background: var(--blue-bright); box-shadow: 0 0 10px var(--blue-glow); }\n\n  /* Gradient text */\n  .grad-text-yb {\n    background: linear-gradient(90deg, var(--yellow) 0%, var(--blue-bright) 100%);\n    -webkit-background-clip: text; background-clip: text; color: transparent;\n  }\n  .grad-text-yr {\n    background: linear-gradient(90deg, var(--yellow) 0%, var(--red-soft) 100%);\n    -webkit-background-clip: text; background-clip: text; color: transparent;\n  }\n\n  /* Animations: fade-up */\n  [data-anim] { opacity: 0; transform: translateY(28px); transition: opacity 1.05s cubic-bezier(.22,1,.36,1), transform 1.05s cubic-bezier(.22,1,.36,1); }\n  [data-anim].in { opacity: 1; transform: translateY(0); }\n\n  .stagger > * { opacity: 0; transform: translateY(20px); transition: opacity .9s cubic-bezier(.22,1,.36,1), transform .9s cubic-bezier(.22,1,.36,1); }\n  .stagger.in > * { opacity: 1; transform: none; }\n  .stagger.in > *:nth-child(1){ transition-delay: .05s; }\n  .stagger.in > *:nth-child(2){ transition-delay: .12s; }\n  .stagger.in > *:nth-child(3){ transition-delay: .19s; }\n  .stagger.in > *:nth-child(4){ transition-delay: .26s; }\n  .stagger.in > *:nth-child(5){ transition-delay: .33s; }\n  .stagger.in > *:nth-child(6){ transition-delay: .40s; }\n  .stagger.in > *:nth-child(7){ transition-delay: .47s; }\n  .stagger.in > *:nth-child(8){ transition-delay: .54s; }\n  .stagger.in > *:nth-child(9){ transition-delay: .61s; }\n  .stagger.in > *:nth-child(10){ transition-delay: .68s; }\n\n  /* Stroke draw for SVG paths */\n  .stroke-draw { stroke-dasharray: 1; stroke-dashoffset: 1; transition: stroke-dashoffset 2.4s cubic-bezier(.22,1,.36,1); }\n  .stroke-draw.in { stroke-dashoffset: 0; }\n\n  /* Bar grow */\n  .bar-grow { transform-origin: bottom; transform: scaleY(0); transition: transform 1.4s cubic-bezier(.22,1,.36,1); }\n  .bar-grow.in { transform: scaleY(1); }\n\n  /* Scroll cue */\n  .scroll-cue {\n    position: absolute; left: 50%; bottom: 40px; transform: translateX(-50%);\n    display: flex; flex-direction: column; align-items: center; gap: 10px;\n    color: var(--text-faint);\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase;\n  }\n  .scroll-cue .bar { width: 1px; height: 56px; background: linear-gradient(to bottom, transparent, var(--text-faint)); position: relative; overflow: hidden; }\n  .scroll-cue .bar::after {\n    content: \"\"; position: absolute; left: 0; right: 0; top: -40%; height: 40%;\n    background: linear-gradient(to bottom, transparent, var(--yellow));\n    animation: pulseDown 2.4s ease-in-out infinite;\n  }\n  @keyframes pulseDown { 0% { top: -40%; opacity: 0; } 30% { opacity: 1; } 100% { top: 100%; opacity: 0; } }\n\n  /* Card */\n  .card {\n    border: 1px solid var(--line);\n    border-radius: 18px;\n    padding: 28px;\n    background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0));\n    transition: border-color .5s ease, background .5s ease;\n  }\n  .card.accent-yellow { border-color: rgba(255,204,0,0.30); background: linear-gradient(180deg, rgba(255,204,0,0.06), rgba(255,255,255,0)); }\n
